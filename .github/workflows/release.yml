# Auto-build & release desktop packages.
# Trigger: push a tag like v0.2.0  →  GitHub Release with mac (arm64+x64 dmg/zip)
# and Windows (x64 nsis/zip) artifacts. workflow_dispatch builds a draft release.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac dmg zip --arm64 --x64
          - os: windows-latest
            args: --win nsis zip --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix server ci
          npm --prefix web ci

      - name: Build web + bundle server
        run: npm run build

      - name: Package & publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # no signing certs in CI — skip identity discovery on mac
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

  # Fill the release body so the in-app 更新日志 card has real content:
  # hand-written notes from .release-notes/<tag>.md win; otherwise fall back
  # to auto-generated notes (commits since last tag).
  notes:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Fill release notes
        run: |
          if [ -f ".release-notes/${GITHUB_REF_NAME}.md" ]; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file ".release-notes/${GITHUB_REF_NAME}.md"
          else
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
